# LLM settings for policy_expr.
# Leave fields empty to use existing environment-variable defaults.
llm:
  action_policy:
    provider: dashscope
    model: qwen3.5-35b-a3b
  back_nav:
    provider: dashscope
    model: qwen3.6-35b-a3b
  supervisor:
    provider: dashscope
    model: qwen3.5-35b-a3b
    decompose:
      # 任务分解——只在开始时调用一次，建议用更强的模型
      provider: dashscope
      model: qwen3.5-35b-a3b
  reader:
    provider: dashscope
    model: qwen3.5-35b-a3b
  output:
    provider: dashscope
    model: qwen3.5-flash
  fingerprint:
    provider: dashscope
    model: qwen3.5-flash
